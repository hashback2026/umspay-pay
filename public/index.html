<!DOCTYPE html>
<html>
<head>
    <title>Bulk STK Push Bot</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        textarea, input { width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 12px; background: green; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; background: white; padding: 10px; }
    </style>
</head>
<body>

<h2>Bulk STK Push (UMSPay)</h2>

<label>Phone Numbers (one per line)</label>
<textarea id="numbers" rows="10"></textarea>

<label>Amount</label>
<input type="number" id="amount" />

<label>Reference</label>
<input type="text" id="reference" />

<button onclick="sendSTK()">Send STK Push</button>

<div id="result"></div>

<script>
async function sendSTK() {
    const numbers = document.getElementById("numbers").value;
    const amount = document.getElementById("amount").value;
    const reference = document.getElementById("reference").value;

    const res = await fetch("/send-stk", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ numbers, amount, reference })
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
        "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}
</script>

</body>
</html>
